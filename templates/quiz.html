<form method="POST" action="/results">
    <label>Mood:</label>
    <select name="mood">
        <option value="happy">Happy</option>
        <option value="sad">Sad</option>
    </select>

    <br><br>

    <label>Genre:</label>
    <select name="genre">
        <option value="pop">Pop</option>
        <option value="rap">Rap</option>
    </select>

    <br><br>

    <button type="submit">Get Recommendation</button>
</form>
