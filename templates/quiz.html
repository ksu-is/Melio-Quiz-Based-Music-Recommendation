<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Melio — Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #c8a96e;
      --accent2: #7c6fcd;
      --text: #e8e4dc;
      --muted: #6e6a7c;
      --card: #13131c;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }

    .bg-orbs {
      position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
    }
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.14;
      animation: drift 18s ease-in-out infinite alternate;
    }
    .orb-1 { width: 500px; height: 500px; background: var(--accent2); top: -200px; left: -100px; }
    .orb-2 { width: 350px; height: 350px; background: var(--accent); bottom: -100px; right: -80px; animation-delay: -7s; }
    @keyframes drift {
      from { transform: translate(0,0); }
      to   { transform: translate(30px, 20px); }
    }

    .page {
      position: relative; z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 80px;
    }

    /* nav */
    nav {
      width: 100%; max-width: 760px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 60px;
      animation: fadeUp 0.6s ease both;
    }
    .logo-link {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 14px; height: 14px; fill: var(--bg); }
    .logo-name {
      font-family: 'Playfair Display', serif;
      font-size: 1rem; letter-spacing: 0.1em;
      color: var(--accent); text-transform: uppercase;
    }
    .nav-hint {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* header */
    .quiz-header {
      text-align: center;
      margin-bottom: 52px;
      animation: fadeUp 0.7s 0.1s ease both;
    }
    .quiz-header .label {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }
    .quiz-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 3.5vw, 3rem);
      font-weight: 700;
    }
    .quiz-header p {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 300;
    }

    /* Form */
    form {
      width: 100%; max-width: 760px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .question-block {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 32px;
      animation: fadeUp 0.7s ease both;
    }
    .question-block:nth-child(1) { animation-delay: 0.15s; }
    .question-block:nth-child(2) { animation-delay: 0.25s; }
    .question-block:nth-child(3) { animation-delay: 0.35s; }
    .question-block:nth-child(4) { animation-delay: 0.45s; }

    .q-label {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }
    .q-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      margin-bottom: 24px;
    }

    /* options  */
    .options {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .option-label {
      cursor: pointer;
    }
    .option-label input[type="radio"] {
      position: absolute; opacity: 0; width: 0; height: 0;
    }
    .option-pill {
      display: inline-block;
      padding: 10px 22px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 400;
      transition: all 0.2s ease;
      user-select: none;
    }
    .option-label input:checked + .option-pill {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
      font-weight: 500;
    }
    .option-label:hover .option-pill {
      border-color: var(--accent);
      color: var(--text);
    }

    /* emojis for mood */
    .option-pill .em { margin-right: 6px; }

    /* submit */
    .submit-row {
      display: flex;
      justify-content: flex-end;
      animation: fadeUp 0.7s 0.5s ease both;
    }
    button[type="submit"] {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--accent);
      color: var(--bg);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 18px 40px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    button[type="submit"]:hover {
      background: var(--text);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(200,169,110,0.3);
    }
    button[type="submit"] svg {
      width: 16px; height: 16px;
      transition: transform 0.2s;
    }
    button[type="submit"]:hover svg { transform: translateX(4px); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="page">
    <nav>
      <a href="/" class="logo-link">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
        </div>
        <span class="logo-name">Melio</span>
      </a>
      <span class="nav-hint">Music Quiz</span>
    </nav>

    <div class="quiz-header">
      <div class="label">Step 1 of 1</div>
      <h1>How are you feeling?</h1>
      <p>Tell us about your mood and we'll find the perfect songs.</p>
    </div>

    <form method="POST" action="/results">

  <!-- mood for person -->
<div class="question-block">
  <div class="q-label">Question 1</div>
  <div class="q-title">What's your current mood?</div>
  <div class="options">

    <label class="option-label">
      <input type="radio" name="mood" value="happy" required/>
      <span class="option-pill">Happy</span>
    </label>

    <label class="option-label">
      <input type="radio" name="mood" value="sad"/>
      <span class="option-pill">Sad</span>
    </label>

    <label class="option-label">
      <input type="radio" name="mood" value="romantic"/>
      <span class="option-pill">Romantic</span>
    </label>

    <label class="option-label">
      <input type="radio" name="mood" value="nostalgic"/>
      <span class="option-pill">Nostalgic</span>
    </label>

    <label class="option-label">
      <input type="radio" name="mood" value="energetic"/>
      <span class="option-pill">Energetic</span>
    </label>

    <label class="option-label">
      <input type="radio" name="mood" value="calm"/>
      <span class="option-pill">Calm</span>
    </label>

  </div>
</div>

      <!-- genre boxes -->
      <div class="question-block">
        <div class="q-label">Question 2</div>
        <div class="q-title">What genre are you feeling?</div>
        <div class="options">
          <label class="option-label">
            <input type="radio" name="genre" value="pop" required/>
            <span class="option-pill">Pop</span>
          </label>
          <label class="option-label">
            <input type="radio" name="genre" value="rap"/>
            <span class="option-pill">Rap</span>
          </label>
          <label class="option-label">
            <input type="radio" name="genre" value="rnb"/>
            <span class="option-pill">R&B</span>
          </label>
          <label class="option-label">
            <input type="radio" name="genre" value="rock"/>
            <span class="option-pill">Rock</span>
          </label>
          <label class="option-label">
            <input type="radio" name="genre" value="afro"/>
            <span class="option-pill">Afro</span>
          </label>
        </div>
      </div>

      <!-- energy boxes -->
      <div class="question-block">
        <div class="q-label">Question 3</div>
        <div class="q-title">What energy level fits right now?</div>
        <div class="options">
          <label class="option-label">
            <input type="radio" name="energy" value="low" required/>
            <span class="option-pill">😴 Low</span>
          </label>
          <label class="option-label">
            <input type="radio" name="energy" value="medium"/>
            <span class="option-pill">😌 Medium</span>
          </label>
          <label class="option-label">
            <input type="radio" name="energy" value="high"/>
            <span class="option-pill">🤩 High</span>
          </label>
        </div>
      </div>

      <!-- activity boxes -->
      <div class="question-block">
        <div class="q-label">Question 4</div>
        <div class="q-title">What are you up to?</div>
        <div class="options">
          <label class="option-label">
            <input type="radio" name="activity" value="relaxing" required/>
            <span class="option-pill">🛋 Relaxing</span>
          </label>
          <label class="option-label">
            <input type="radio" name="activity" value="chill"/>
            <span class="option-pill"> Chilling</span>
          </label>
          <label class="option-label">
            <input type="radio" name="activity" value="driving"/>
            <span class="option-pill"> Driving</span>
          </label>
          <label class="option-label">
            <input type="radio" name="activity" value="studying"/>
            <span class="option-pill"> Studying</span>
          </label>
          <label class="option-label">
            <input type="radio" name="activity" value="party"/>
            <span class="option-pill"> Partying</span>
          </label>
        </div>
      </div>

      <div class="submit-row">
        <button type="submit">
          Find My Songs
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>

    </form>
  </div>
</body>
</html>
