<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
</head>
<body>
    <h1>Your Results</h1>

    <p>Mood: {{ mood }}</p>
    <p>Genre: {{ genre }}</p>
    <p>Energy: {{ energy }}</p>
    <p>Activity: {{ activity }}</p>

    <a href="/quiz">Try again</a>

    <hr>

    {% if songs %}
        <h2>Recommended Songs:</h2>

    {% for song in songs %}
      <div>
        <h3>{{ song.title }} by {{ song.artist }}</h3>
        <p>Match score: {{ song.score }}</p>
        <p>
          Why: {{ song.reasons | join(", ") }}
        </p>
      </div>
    {% endfor %}

</body>
</html>
